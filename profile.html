<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โปรไฟล์ · ร้านเจ๊หน่อย</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  [data-theme="light"]{
    --bg:#ffffff;--bg-soft:#fbfcfd;--surface:#ffffff;--surface-2:#f4f6f8;
    --border:#edf0f3;--border-strong:#e2e6ea;
    --text:#0f1a17;--muted:#5b6660;
    --primary:#0a7d55;--primary-press:#086547;--primary-text:#0a7d55;--on-primary:#fff;
    --accent:#b8954a;--dot:rgba(10,125,85,.10);--hero-from:#0a7d55;--hero-to:#075e40;
    --win-bg:#eef7f1;--win-border:#cfe8da;--win-text:#0a7d55;
    --lose-text:#6b747c;--loss:#b0453c;
    --wait-bg:#fbf3ea;--wait-border:#f0e0cb;--wait-text:#8a5f22;
    --shadow-1:0 1px 2px rgba(16,40,30,.04),0 4px 12px rgba(16,40,30,.05);
    --shadow-2:0 2px 4px rgba(16,40,30,.05),0 12px 28px rgba(16,40,30,.08);
    --shadow-nav:0 -1px 0 var(--border),0 -8px 24px rgba(16,40,30,.05);
    --grid-line:rgba(0,0,0,.05)
  }
  [data-theme="dark"]{
    --bg:#0e1311;--bg-soft:#0e1311;--surface:#161c1a;--surface-2:#1e2522;
    --border:#283330;--border-strong:#32403c;
    --text:#e9efec;--muted:#8b968f;
    --primary:#34c98a;--primary-press:#2bb47b;--primary-text:#4fd49b;--on-primary:#06241a;
    --accent:#d4b56e;--dot:rgba(79,212,155,.10);--hero-from:#117a57;--hero-to:#0c5b41;
    --win-bg:rgba(52,201,138,.12);--win-border:rgba(52,201,138,.32);--win-text:#4fd49b;
    --lose-text:#6b747c;--loss:#e0817a;
    --wait-bg:rgba(212,181,110,.12);--wait-border:rgba(212,181,110,.3);--wait-text:#d4b56e;
    --shadow-1:0 1px 2px rgba(0,0,0,.4),0 4px 12px rgba(0,0,0,.35);
    --shadow-2:0 2px 4px rgba(0,0,0,.5),0 12px 28px rgba(0,0,0,.5);
    --shadow-nav:0 -1px 0 var(--border),0 -8px 24px rgba(0,0,0,.5);
    --grid-line:rgba(255,255,255,.05)
  }

  *{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
  body{font-family:'Sarabun',sans-serif;background:var(--bg-soft);color:var(--text);margin:0;transition:background .25s,color .25s}
  .app{width:100%;margin:0 auto;min-height:100vh;background:var(--bg-soft);display:flex;flex-direction:column}
  .content-wrap{width:100%;max-width:640px;margin:0 auto}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-1);transition:background .25s,box-shadow .2s}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--surface);border-top:1px solid var(--border);box-shadow:var(--shadow-nav)}
  .bottom-nav-inner{max-width:640px;margin:0 auto;display:flex}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 12px;color:var(--muted);font-size:11px;cursor:pointer;text-decoration:none;background:none;border:none;font-family:inherit;transition:color .15s}
  .nav-item.active{color:var(--primary-text);font-weight:600}
  .theme-toggle{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:10px}
  .card-hero{position:relative;overflow:hidden;border:none;border-radius:22px;color:#fff;
    background:linear-gradient(135deg,var(--hero-from),var(--hero-to));
    box-shadow:0 8px 28px rgba(10,94,64,.32),0 2px 6px rgba(10,94,64,.2)}
  .card-hero::after{content:'';position:absolute;top:-40%;right:-15%;width:60%;height:160%;
    background:radial-gradient(circle,rgba(255,255,255,.14),transparent 65%);pointer-events:none}
  .btn-logout{background:var(--loss);color:#fff;border:none;border-radius:14px;font-weight:600;font-family:inherit;font-size:1rem;padding:16px;width:100%;cursor:pointer;transition:opacity .15s,transform .1s}
  .btn-logout:active{opacity:.85;transform:scale(.98)}
  .info-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border)}
  .info-row:last-child{border-bottom:none}
  .info-icon{width:40px;height:40px;border-radius:12px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .field-inline{background:transparent;border:none;border-bottom:1.5px solid var(--border);color:var(--text);font-family:'Sarabun',sans-serif;font-size:1rem;font-weight:600;width:100%;padding:4px 2px 5px;outline:none;transition:border-color .15s;border-radius:0}
  .field-inline:focus{border-bottom-color:var(--primary)}
  .plan-bar-bg{background:var(--surface-2);border-radius:999px;height:8px;overflow:hidden}
  .plan-bar-fill{background:var(--primary);height:100%;border-radius:999px;transition:width .4s}

  /* fallback utilities */
  .sticky{position:sticky}.top-0{top:0}.z-30{z-index:30}
  .flex{display:flex}.flex-1{flex:1 1 0%}.flex-col{flex-direction:column}.flex-shrink-0{flex-shrink:0}
  .items-center{align-items:center}.justify-between{justify-content:space-between}.justify-center{justify-content:center}
  .w-full{width:100%}.w-10{width:2.5rem}.h-10{height:2.5rem}
  .gap-2{gap:.5rem}.gap-3{gap:.75rem}.gap-4{gap:1rem}
  .px-5{padding-left:1.25rem;padding-right:1.25rem}.py-4{padding-top:1rem;padding-bottom:1rem}
  .pt-5{padding-top:1.25rem}.pb-32{padding-bottom:8rem}.pb-40{padding-bottom:10rem}
  .p-5{padding:1.25rem}.p-4{padding:1rem}
  .mb-3{margin-bottom:.75rem}.mb-4{margin-bottom:1rem}.mb-5{margin-bottom:1.25rem}.mb-6{margin-bottom:1.5rem}
  .mt-2{margin-top:.5rem}.mt-3{margin-top:.75rem}.mt-1{margin-top:.25rem}
  .text-xs{font-size:.75rem;line-height:1.1rem}.text-sm{font-size:.875rem;line-height:1.35rem}
  .text-base{font-size:1rem;line-height:1.5rem}.text-xl{font-size:1.25rem;line-height:1.75rem}
  .text-2xl{font-size:1.5rem;line-height:2rem}
  .font-medium{font-weight:500}.font-semibold{font-weight:600}.font-bold{font-weight:700}.font-extrabold{font-weight:800}
  .text-center{text-align:center}.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rounded-full{border-radius:9999px}.rounded-xl{border-radius:.75rem}
  .space-y-3>*+*{margin-top:.75rem}.space-y-4>*+*{margin-top:1rem}
  .hidden{display:none}
  h1{letter-spacing:-.02em}
</style>
</head>
<body>
<div class="app">

  <header class="sticky top-0 z-30" style="background:var(--bg-soft);border-bottom:1px solid var(--border);">
    <div class="content-wrap px-5 py-4">
      <div class="flex items-center justify-between">
        <h1 class="font-bold" style="font-size:1.25rem;color:var(--text)">โปรไฟล์</h1>
        <button onclick="toggleTheme()" class="theme-toggle w-10 h-10 flex items-center justify-center" aria-label="สลับธีม">
          <svg id="iconMoon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          <svg id="iconSun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1" style="background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:44px 44px;">
    <div class="content-wrap px-5 pb-40" style="padding-top:1.5rem">

      <!-- Hero: avatar + ชื่อ -->
      <div class="card-hero p-5 mb-5">
        <div style="position:absolute;inset:0;pointer-events:none;overflow:hidden;">
          <div style="position:absolute;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.10);top:-40px;right:-25px;"></div>
          <div style="position:absolute;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08);top:15px;right:80px;"></div>
          <div style="position:absolute;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.12);bottom:-10px;right:55px;"></div>
        </div>
        <div class="flex items-center gap-4">
          <div id="heroAvatar" style="width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:#fff;flex-shrink:0;"></div>
          <div>
            <p id="heroName" style="font-size:1.3rem;font-weight:800;color:#fff;line-height:1.2"></p>
            <p id="heroPhone" style="font-size:.85rem;color:rgba(255,255,255,.75);margin-top:3px"></p>
          </div>
        </div>
      </div>

      <!-- ข้อมูลบัญชี -->
      <p class="text-xs font-semibold mb-3" style="color:var(--muted);letter-spacing:.04em;text-transform:uppercase">ข้อมูลบัญชี</p>
      <div class="card mb-5" style="padding:0;overflow:hidden">
        <div class="info-row">
          <div class="info-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary-text)" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="flex-1">
            <p class="text-xs" style="color:var(--muted);margin-bottom:4px">ชื่อเจ้าของร้าน</p>
            <input id="inputName" class="field-inline" type="text" placeholder="ชื่อของคุณ">
          </div>
        </div>
        <div class="info-row">
          <div class="info-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary-text)" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </div>
          <div class="flex-1">
            <p class="text-xs" style="color:var(--muted);margin-bottom:4px">เบอร์โทร</p>
            <input id="inputPhone" class="field-inline" type="tel" placeholder="08x-xxx-xxxx">
          </div>
        </div>
      </div>

      <!-- แผนการใช้งาน -->
      <p class="text-xs font-semibold mb-3" style="color:var(--muted);letter-spacing:.04em;text-transform:uppercase">แผนการใช้งาน</p>
      <div class="card mb-5 p-5">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <div style="width:32px;height:32px;border-radius:10px;background:var(--win-bg);border:1px solid var(--win-border);display:flex;align-items:center;justify-content:center;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--win-text)" stroke-width="2.5"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
            </div>
            <div>
              <p class="font-semibold text-sm">แพ็กเกจรายเดือน</p>
              <p class="text-xs" style="color:var(--muted)">ต่ออายุอัตโนมัติ</p>
            </div>
          </div>
          <span class="text-xs font-semibold px-2.5 py-1" style="background:var(--win-bg);border:1px solid var(--win-border);color:var(--win-text);border-radius:8px">ใช้งานอยู่</span>
        </div>

        <div class="plan-bar-bg mb-2">
          <div class="plan-bar-fill" style="width:65%"></div>
        </div>

        <div class="flex items-center justify-between">
          <p class="text-sm font-medium" style="color:var(--muted)">ใช้งานได้อีก</p>
          <p class="font-bold" style="color:var(--primary-text);font-size:1.1rem">20 วัน</p>
        </div>

        <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs" style="color:var(--muted)">วันที่เริ่มต้น</p>
              <p class="font-medium text-sm" style="margin-top:2px">13 พ.ค. 2569</p>
            </div>
            <div style="text-align:right">
              <p class="text-xs" style="color:var(--muted)">วันหมดอายุ</p>
              <p class="font-medium text-sm" style="margin-top:2px">12 มิ.ย. 2569</p>
            </div>
          </div>
        </div>
      </div>

      <!-- ปุ่มออกจากระบบ -->
      <button class="btn-logout" onclick="openLogout()">
        <div class="flex items-center justify-center gap-2">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          ออกจากระบบ
        </div>
      </button>

    </div>
  </main>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="index.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        ลูกค้า
      </a>
      <a href="lottery.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9h.01M12 9h.01M17 9h.01M7 14h5"/></svg>
        หวย
      </a>
      <a href="results.html" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m7 14 3-3 3 3 4-5"/></svg>
        ผลสรุป
      </a>
      <a href="profile.html" class="nav-item active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        โปรไฟล์
      </a>
    </div>
  </nav>

  <!-- Logout confirmation -->
  <div class="overlay" id="logoutOverlay" onclick="closeLogout()" style="position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .3s;z-index:55;"></div>
  <div class="sheet" id="logoutSheet" style="position:fixed;left:50%;transform:translateX(-50%) translateY(110%);bottom:0;width:100%;max-width:640px;background:var(--surface);border-top-left-radius:24px;border-top-right-radius:24px;transition:transform .3s cubic-bezier(.32,.72,0,1);z-index:60;box-shadow:0 -4px 24px rgba(0,0,0,.18);">
    <div class="p-5">
      <div class="flex items-center justify-center mb-1"><div style="width:40px;height:4px;border-radius:999px;background:var(--border)"></div></div>
      <div style="margin-top:1rem;margin-bottom:1.25rem;text-align:center">
        <div style="width:48px;height:48px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </div>
        <p class="font-bold" style="font-size:1.125rem">ออกจากระบบ?</p>
        <p class="text-sm" style="color:var(--muted);margin-top:4px">ต้องการออกจากระบบหรือไม่</p>
      </div>
      <div class="flex gap-3">
        <button onclick="closeLogout()" style="flex:1;padding:12px;border-radius:12px;font-weight:600;font-size:.875rem;background:var(--surface-2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-family:inherit">ยกเลิก</button>
        <button onclick="doLogout()" style="flex:1;padding:12px;border-radius:12px;font-weight:600;font-size:.875rem;background:#b0453c;color:#fff;border:none;cursor:pointer;font-family:inherit">ออกจากระบบ</button>
      </div>
    </div>
  </div>

</div>
<script>
  const DEFAULT_NAME = 'เจ๊หน่อย';
  const DEFAULT_PHONE = '081-234-5678';

  function initials(name) {
    const chars = [...name.trim()];
    if (chars.length === 0) return '?';
    return chars.length >= 2 ? chars[0] + chars[1] : chars[0];
  }

  function updateHero(name, phone) {
    document.getElementById('heroAvatar').textContent = initials(name || DEFAULT_NAME);
    document.getElementById('heroName').textContent = name || DEFAULT_NAME;
    document.getElementById('heroPhone').textContent = phone || DEFAULT_PHONE;
  }

  function loadProfile() {
    const name = localStorage.getItem('profileName') || DEFAULT_NAME;
    const phone = localStorage.getItem('profilePhone') || DEFAULT_PHONE;
    document.getElementById('inputName').value = name;
    document.getElementById('inputPhone').value = phone;
    updateHero(name, phone);
  }

  function saveProfile() {
    const name = document.getElementById('inputName').value.trim();
    const phone = document.getElementById('inputPhone').value.trim();
    localStorage.setItem('profileName', name || DEFAULT_NAME);
    localStorage.setItem('profilePhone', phone || DEFAULT_PHONE);
    updateHero(name || DEFAULT_NAME, phone || DEFAULT_PHONE);
  }

  function openLogout(){
    document.getElementById('logoutSheet').style.transform='translateX(-50%) translateY(0)';
    const ov=document.getElementById('logoutOverlay');
    ov.style.opacity='1';ov.style.pointerEvents='auto';
  }
  function closeLogout(){
    document.getElementById('logoutSheet').style.transform='translateX(-50%) translateY(110%)';
    const ov=document.getElementById('logoutOverlay');
    ov.style.opacity='0';ov.style.pointerEvents='none';
  }
  function doLogout(){
    sessionStorage.removeItem('loggedIn');
    sessionStorage.removeItem('user');
    window.location.href='login.html';
  }
  function toggleTheme(){
    const h=document.documentElement;
    const n=h.getAttribute('data-theme')==='dark'?'light':'dark';
    h.setAttribute('data-theme',n);
    document.getElementById('iconMoon').style.display=n==='dark'?'none':'block';
    document.getElementById('iconSun').style.display=n==='dark'?'block':'none';
  }

  loadProfile();
  document.getElementById('inputName').addEventListener('input', saveProfile);
  document.getElementById('inputPhone').addEventListener('input', saveProfile);
</script>
</body>
</html>
