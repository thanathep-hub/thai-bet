<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ · ร้านเจ๊หน่อย</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  [data-theme="light"]{
    --bg:#ffffff;--bg-soft:#fbfcfd;--surface:#ffffff;--surface-2:#f4f6f8;
    --border:#edf0f3;--border-strong:#e2e6ea;
    --text:#0f1a17;--muted:#5b6660;
    --primary:#0a7d55;--primary-press:#086547;--primary-text:#0a7d55;--on-primary:#fff;
    --hero-from:#0a7d55;--hero-to:#075e40;
    --shadow-1:0 1px 2px rgba(16,40,30,.04),0 4px 12px rgba(16,40,30,.05);
    --shadow-2:0 2px 4px rgba(16,40,30,.05),0 12px 28px rgba(16,40,30,.08);
    --grid-line:rgba(0,0,0,.05);
    --error-bg:#fff0f0;--error-border:#fcc;--error-text:#b0453c;
  }
  [data-theme="dark"]{
    --bg:#0e1311;--bg-soft:#0e1311;--surface:#161c1a;--surface-2:#1e2522;
    --border:#283330;--border-strong:#32403c;
    --text:#e9efec;--muted:#8b968f;
    --primary:#34c98a;--primary-press:#2bb47b;--primary-text:#4fd49b;--on-primary:#06241a;
    --hero-from:#117a57;--hero-to:#0c5b41;
    --shadow-1:0 1px 2px rgba(0,0,0,.4),0 4px 12px rgba(0,0,0,.35);
    --shadow-2:0 2px 4px rgba(0,0,0,.5),0 12px 28px rgba(0,0,0,.5);
    --grid-line:rgba(255,255,255,.05);
    --error-bg:rgba(176,69,60,.12);--error-border:rgba(176,69,60,.35);--error-text:#e0817a;
  }

  *{-webkit-tap-highlight-color:transparent;box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Sarabun',sans-serif;
    background:var(--bg-soft);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    transition:background .25s,color .25s;
    background-image:
      linear-gradient(var(--grid-line) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
    background-size:44px 44px;
  }

  .wrap{width:100%;max-width:380px;padding:24px 20px 40px;}

  /* Logo / brand */
  .brand{text-align:center;margin-bottom:32px;}
  .brand-icon{
    width:64px;height:64px;border-radius:20px;
    background:linear-gradient(135deg,var(--hero-from),var(--hero-to));
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 8px 24px rgba(10,94,64,.30);
    margin-bottom:14px;position:relative;overflow:hidden;
  }
  .brand-icon::after{
    content:'';position:absolute;inset:0;
    background:radial-gradient(circle at 70% 30%,rgba(255,255,255,.22),transparent 65%);
  }
  .brand-name{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;}
  .brand-sub{font-size:.8rem;color:var(--muted);margin-top:2px;}

  /* Card */
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    box-shadow:var(--shadow-2);
    padding:28px 24px;
  }
  .card-title{font-size:1.1rem;font-weight:700;margin-bottom:20px;}

  /* Fields */
  .field-wrap{margin-bottom:14px;}
  label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .field{
    width:100%;padding:12px 14px;
    background:var(--surface-2);border:1px solid var(--border);
    border-radius:12px;color:var(--text);font-family:'Sarabun',sans-serif;
    font-size:.925rem;transition:border-color .15s,box-shadow .15s;
    outline:none;
  }
  .field:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(10,125,85,.1);}
  .field::placeholder{color:var(--muted);}

  /* Password wrapper */
  .pw-wrap{position:relative;}
  .pw-wrap .field{padding-right:44px;}
  .pw-toggle{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;color:var(--muted);
    display:flex;align-items:center;padding:4px;
  }

  /* Error */
  .error-msg{
    display:none;
    background:var(--error-bg);border:1px solid var(--error-border);
    color:var(--error-text);border-radius:10px;
    padding:10px 12px;font-size:.8rem;font-weight:500;margin-bottom:14px;
  }
  .error-msg.show{display:flex;align-items:center;gap:8px;}

  /* Button */
  .btn-login{
    width:100%;padding:13px;margin-top:6px;
    background:var(--primary);color:var(--on-primary);
    border:none;border-radius:12px;
    font-family:'Sarabun',sans-serif;font-size:1rem;font-weight:700;
    cursor:pointer;transition:transform .1s,background .15s,box-shadow .15s;
    box-shadow:0 4px 14px rgba(10,94,64,.25);
  }
  .btn-login:active{transform:scale(.97);background:var(--primary-press);}
  .btn-login:disabled{opacity:.5;pointer-events:none;}

  /* Theme toggle */
  .theme-btn{
    position:fixed;top:16px;right:16px;
    width:38px;height:38px;border-radius:10px;border:none;cursor:pointer;
    background:var(--surface);border:1px solid var(--border);
    box-shadow:var(--shadow-1);color:var(--text);
    display:flex;align-items:center;justify-content:center;
  }

  /* DateTime */
  .datetime{text-align:center;margin-bottom:22px;}
  .datetime-date{font-size:.82rem;color:var(--muted);margin-bottom:2px;}
  .datetime-time{font-size:1.65rem;font-weight:800;letter-spacing:.03em;font-variant-numeric:tabular-nums;color:var(--text);}

  /* Contact admin */
  .contact-link{text-align:right;margin-top:14px;font-size:.8rem;color:var(--muted);}
  .contact-link a{color:var(--primary-text);font-weight:600;text-decoration:none;}

  /* Footer */
  .footer{text-align:center;margin-top:28px;font-size:.72rem;color:var(--muted);line-height:1.8;}

  /* Shake animation for wrong password */
  @keyframes shake{
    0%,100%{transform:none}
    20%{transform:translateX(-5px)}
    40%{transform:translateX(5px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }
  .shake{animation:shake .35s ease-out;}
</style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()" aria-label="สลับธีม">
  <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
  <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
</button>

<div class="wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9h.01M12 9h.01M17 9h.01M7 14h5"/></svg>
    </div>
    <p class="brand-name">ระบบจัดการหวย</p>
  </div>

  <div class="datetime">
    <p class="datetime-date" id="dateStr"></p>
    <p class="datetime-time" id="timeStr"></p>
  </div>

  <div class="card" id="loginCard">
    <p class="card-title">เข้าสู่ระบบ</p>

    <div class="error-msg" id="errMsg">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
      <span id="errText">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</span>
    </div>

    <div class="field-wrap">
      <label for="username">ชื่อผู้ใช้</label>
      <input id="username" class="field" type="text" placeholder="กรอกชื่อผู้ใช้" autocomplete="username" autocorrect="off" autocapitalize="none" value="admin">
    </div>

    <div class="field-wrap">
      <label for="password">รหัสผ่าน</label>
      <div class="pw-wrap">
        <input id="password" class="field" type="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password" value="1234">
        <button class="pw-toggle" onclick="togglePw()" type="button" aria-label="แสดง/ซ่อนรหัสผ่าน">
          <svg id="eyeOn" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eyeOff" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61M2 2l20 20"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="btnLogin" onclick="doLogin()">เข้าสู่ระบบ</button>
    <p class="contact-link">เข้าสู่ระบบไม่ได้ ? <a href="#">ติดต่อแอดมิน</a></p>
  </div>

  <footer class="footer">
    ระบบจัดการหวย<br>
    v1.0 &nbsp;·&nbsp; © 2568
  </footer>
</div>

<script>
  const USERS = { 'admin': '1234', 'jainoi': '1234' };

  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const card = document.getElementById('loginCard');
    const err = document.getElementById('errMsg');

    if (!u || !p) {
      showError('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน');
      return;
    }
    if (USERS[u] && USERS[u] === p) {
      sessionStorage.setItem('loggedIn', '1');
      sessionStorage.setItem('user', u);
      window.location.href = 'index.html';
    } else {
      showError('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
      card.classList.remove('shake');
      void card.offsetWidth;
      card.classList.add('shake');
    }
  }

  function showError(msg) {
    const err = document.getElementById('errMsg');
    document.getElementById('errText').textContent = msg;
    err.classList.add('show');
  }

  function togglePw() {
    const f = document.getElementById('password');
    const on = document.getElementById('eyeOn');
    const off = document.getElementById('eyeOff');
    const show = f.type === 'password';
    f.type = show ? 'text' : 'password';
    on.style.display = show ? 'none' : '';
    off.style.display = show ? '' : 'none';
  }

  function toggleTheme() {
    const h = document.documentElement;
    const n = h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    h.setAttribute('data-theme', n);
    document.getElementById('iconMoon').style.display = n === 'dark' ? 'none' : '';
    document.getElementById('iconSun').style.display = n === 'dark' ? '' : 'none';
  }

  // Clock
  const DAYS = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
  const MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  function updateClock() {
    const now = new Date();
    document.getElementById('dateStr').textContent =
      `วัน${DAYS[now.getDay()]}ที่ ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()+543}`;
    document.getElementById('timeStr').textContent =
      [now.getHours(), now.getMinutes(), now.getSeconds()]
        .map(n => String(n).padStart(2,'0')).join(':');
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Enter key submits
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  // Hide error on input
  ['username','password'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById('errMsg').classList.remove('show');
    });
  });
</script>
</body>
</html>
